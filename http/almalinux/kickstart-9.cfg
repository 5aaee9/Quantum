# Generated by Anaconda 34.25.5.9
# Generated by pykickstart v3.32
#version=RHEL9
# Use graphical install
text

# Disable First boot screen
firstboot --disable

# Network mirror
url --url="https://repo.almalinux.org/almalinux/9/BaseOS/x86_64/kickstart/"

# Reboot after success installtion
reboot

%addon com_redhat_kdump --disable

%end

# Keyboard layouts
keyboard --xlayouts='us'
# System language
lang en_US.UTF-8

%packages
@^minimal-environment
qemu-guest-agent
openssh-server

# unnecessary firmware
-iwl*-firmware
%end

# Generated using Blivet version 3.6.0
ignoredisk --only-use=sda
# Partition clearing information
zerombr
clearpart --all --drives=sda
# Disk partitioning information
part biosboot --fstype=biosboot --size=1
part /boot --fstype="ext4" --ondisk=sda --size=512
part /boot/efi --fstype="efi" --ondisk=sda --size=100 --fsoptions="umask=0077,shortname=winnt"
part / --fstype="xfs" --ondisk=sda --grow --size=1 --label=rootfs

# part btrfs.01 --ondisk=sda --grow --size=1

# btrfs none --data=0 --metadata=1 --label=rootfs btrfs.01
# btrfs / --subvol --name=root LABEL=rootfs

# System timezone
timezone Asia/Hong_Kong --utc
bootloader --location=mbr --append="crashkernel=auto net.ifnames=0 console=tty0 console=ttyS0,115200 earlyprintk=ttyS0,115200 consoleblank=0" --boot-drive=sda

# Root password
rootpw --allow-ssh 4tH2F34cEDRApj8Y@B26

%post --erroronfail
echo "Removing linux-firmware package."
dnf -C -y remove linux-firmware
%end
