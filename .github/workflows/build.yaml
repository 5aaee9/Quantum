name: Build images

on:
  schedule:
  - cron: '0 14 * * 1'
  push:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.builds.name }}
    runs-on: ubuntu-latest
    strategy:
      # Dont cancel entire job if one failed
      fail-fast: false
      matrix:
        builds:
          - name: Debian 11
            codename: debian-11
          - name: Debian 12
            codename: debian-12
          - name: Debian 13
            codename: debian-13
          - name: Debian Testing
            codename: debian-testing
          - name: Alma Linux 8
            codename: almalinux-8
          - name: Alma Linux 9
            codename: almalinux-9
          - name: Ubuntu 24.04
            codename: ubuntu-24_04
          - name: Ubuntu 26.04
            codename: ubuntu-26_04
          - name: Arch Linux
            codename: archlinux
          - name: Vibe Coding Image
            codename: vibe-coding
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - uses: extractions/setup-just@v2

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install qemu-utils qemu-kvm -y

      - name: Build
        env:
          ALIST_UPLOAD_DOMAIN: ${{ secrets.ALIST_UPLOAD_URL }}
          ALIST_USERNAME: ${{ secrets.ALIST_USERNAME }}
          ALIST_PASSWORD: ${{ secrets.ALIST_PASSWORD }}
          JUST_UNSTABLE: true
        run: |
          just build "${{ matrix.builds.codename }}"
          bash .github/scripts/upload-alist.sh "${{ matrix.builds.codename }}.qcow2" "/Local/VirtualMachineImages"
